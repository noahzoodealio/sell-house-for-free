# E4 Playwright E2E suite.
#
# STUB — E4-S9 (7842) lands this workflow so the specs run, but the full CI
# surface (secrets, shard matrix, trace artifact upload, branch protection,
# preview-URL targeting) is owned by E8. When E8 lands, expect this file to
# be folded into a broader test.yml or replaced entirely.
#
# For now: runs against a freshly-spawned `next dev` via Playwright's
# webServer config with `ENRICHMENT_DEV_MOCK=true`. No real MLS calls,
# no secrets required.

name: e2e

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          ENRICHMENT_DEV_MOCK: "true"
        run: npm run test:e2e

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
